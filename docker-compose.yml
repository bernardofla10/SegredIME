services:
  postgres:
    image: postgres:16
    container_name: segredime_postgres
    environment:
      POSTGRES_DB: segredime_local
      POSTGRES_USER: segredime_user
      POSTGRES_PASSWORD: segredime_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U segredime_user -d segredime_local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - segredime_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: segredime_backend
    command: >
      sh -c "python manage.py migrate && 
             python manage.py seed &&
             uvicorn core.asgi:application --host 0.0.0.0 --port 8000 --reload"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: segredime_local
      DB_USER: segredime_user
      DB_PASSWORD: segredime_password
      SECRET_KEY: segredime-dev-secret-key
      SECRETS_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      DEBUG: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./core:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8000/status/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - segredime_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: segredime_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - segredime_network

volumes:
  postgres_data:
    driver: local

networks:
  segredime_network:
    driver: bridge
