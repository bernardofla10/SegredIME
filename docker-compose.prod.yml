# docker-compose.prod.yml — Deploy Grupo 02 (portas 8011-8020)
# Servidor compartilhado Lab Prog III

services:
  postgres:
    image: postgres:16
    container_name: grupo02_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-segredime_prod}
      POSTGRES_USER: ${DB_USER:-segredime_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-segredime_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-8015}:5432"
    volumes:
      - grupo02_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-segredime_user} -d ${DB_NAME:-segredime_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grupo02_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: grupo02_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             uvicorn core.asgi:application --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-segredime_prod}
      DB_USER: ${DB_USER:-segredime_user}
      DB_PASSWORD: ${DB_PASSWORD:-segredime_password}
      SECRET_KEY: ${SECRET_KEY:-segredime-prod-secret-key-grupo02}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      DEBUG: "0"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
    ports:
      - "${BACKEND_PORT:-8014}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8000/status/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - grupo02_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8014}
    container_name: grupo02_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8014}
    ports:
      - "${FRONTEND_PORT:-8013}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - grupo02_network
    restart: unless-stopped

volumes:
  grupo02_postgres_data:
    driver: local

networks:
  grupo02_network:
    driver: bridge
